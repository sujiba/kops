---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: intel-gpu-resource-driver
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: intel-gpu-resource-driver
  interval: 1h
  path: ./kubernetes/home/apps/kube-system/intel-gpu-resource-driver/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-system
  wait: false
