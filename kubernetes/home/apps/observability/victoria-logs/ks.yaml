---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-logs
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: victoria-logs
  dependsOn:
    - name: democratic-csi
      namespace: storage
  interval: 1h
  path: ./kubernetes/home/apps/observability/victoria-logs/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  timeout: 5m
  wait: false

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-logs-collector
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: victoria-logs-collector
  dependsOn:
    - name: victoria-logs
  interval: 1h
  path: ./kubernetes/home/apps/observability/victoria-logs/collector
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  timeout: 5m
  wait: false
