---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kopiur
  values:
    installCRDs: true
    installScope: cluster
    metrics:
      serviceMonitor:
        enabled: true
    webhook:
      certManager:
        enabled: true
