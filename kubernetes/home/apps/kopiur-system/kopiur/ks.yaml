---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopiur
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: kopiur
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kopiur
      namespace: kopiur-system
  interval: 1h
  path: ./kubernetes/home/apps/kopiur-system/kopiur/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopiur-maintenance
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: kopiur
  dependsOn:
    - name: kopiur-repository
  interval: 1h
  path: ./kubernetes/home/apps/kopiur-system/kopiur/maintenance
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopiur-repository
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: kopiur
  dependsOn:
    - name: kopiur
  interval: 1h
  path: ./kubernetes/home/apps/kopiur-system/kopiur/repository
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
