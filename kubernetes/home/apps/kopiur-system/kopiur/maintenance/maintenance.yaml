---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Maintenance
metadata:
  name: kopiur-s3
spec:
  repository:
    kind: ClusterRepository
    name: kopiur-s3
  ownership:
    owner: kopiur-system
    takeoverPolicy: Never
  schedule:
    timezone: ${TZ}
    quick:
      cron: "0 12 * * *"
    full:
      cron: "0 13 * * 0"
