---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}-anubis
spec:
  chartRef:
    kind: OCIRepository
    name: ${APP}-anubis
  interval: 1h
  values:
    configMaps:
      policy:
        suffix: policy
        data:
          policy.yaml: |-
            bots:
              - import: (data)/bots/_deny-pathological.yaml
              - import: (data)/bots/aggressive-brazilian-scrapers.yaml
              - import: (data)/meta/ai-block-aggressive.yaml
              - import: (data)/common/rfc-violations.yaml

              - import: (data)/common/keep-internet-working.yaml
              - import: (data)/common/allow-private-addresses.yaml
              - import: (data)/clients/x-firefox-ai.yaml

              - import: (data)/clients/git.yaml
              - import: (data)/apps/gitea-rss-feeds.yaml
              - import: (data)/clients/docker-client.yaml

              - import: (data)/crawlers/_allow-good.yaml

              - name: generic-browser
                user_agent_regex: >-
                  Mozilla|Opera
                action: WEIGH
                weight:
                  adjust: 10

            dnsbl: false

            status_codes:
              CHALLENGE: 200
              DENY: 403

            thresholds:
              - name: minimal-suspicion
                expression: weight <= 0
                action: ALLOW
              - name: mild-suspicion
                expression:
                  all:
                    - weight > 0
                    - weight < 10
                action: CHALLENGE
                challenge:
                  algorithm: metarefresh
                  difficulty: 1
              - name: moderate-suspicion
                expression:
                  all:
                    - weight >= 10
                    - weight < 20
                action: CHALLENGE
                challenge:
                  algorithm: fast
                  difficulty: 2
              - name: mild-proof-of-work
                expression:
                  all:
                    - weight >= 20
                    - weight < 30
                action: CHALLENGE
                challenge:
                  algorithm: fast
                  difficulty: 4
              - name: extreme-suspicion
                expression: weight >= 30
                action: CHALLENGE
                challenge:
                  algorithm: fast
                  difficulty: 6
    controllers:
      anubis:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/techarohq/anubis
              tag: v1.26.0
            env:
              BIND: ":8080"
              DIFFICULTY: "${ANUBIS_DIFFICULTY:=\"4\"}"
              ED25519_PRIVATE_KEY_HEX:
                valueFrom:
                  secretKeyRef:
                    name: ${APP}-anubis-key-secret
                    key: ED25519_PRIVATE_KEY_HEX
              METRICS_BIND: ":9090"
              OG_EXPIRY_TIME: "24h"
              OG_PASSTHROUGH: "true"
              POLICY_FNAME: "/etc/anubis/policy.yaml"
              SERVE_ROBOTS_TXT: "true"
              TARGET: "${ANUBIS_TARGET}"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "anubis"
                      - "--healthcheck"
                  initialDelaySeconds: 1
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "anubis"
                      - "--healthcheck"
                  initialDelaySeconds: 1
                  periodSeconds: 5
            resources:
              requests:
                memory: 64Mi
              limits:
                memory: "${ANUBIS_MEM_LIMIT:=\"256Mi\"}"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              runAsGroup: 1000
              runAsNonRoot: true
              runAsUser: 1000
              seccompProfile:
                type: RuntimeDefault
    persistence:
      policy:
        type: configMap
        identifier: policy
        globalMounts:
          - path: /etc/anubis
            readOnly: true
    service:
      anubis:
        controller: anubis
        ports:
          http:
            port: 8080
            protocol: HTTP
          metrics:
            port: 9090
            protocol: HTTP
    serviceMonitor:
      app:
        endpoints:
          - port: metrics
            interval: 30s
