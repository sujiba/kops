---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nextcloud
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: nextcloud
  components:
    - ../../../../components/dragonfly
  interval: 1h
  path: ./kubernetes/hcloud/apps/selfhosted/nextcloud/app
  postBuild:
    substitute:
      APP: nextcloud
      DRAGONFLY_REPLICAS: "1"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  wait: false

