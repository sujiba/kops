---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud-valkey
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: nextcloud-valkey

  values:
    controllers:
      valkey:
        pod:
          labels:
            app.kubernetes.io/component: valkey
          securityContext:
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
        containers:
          valkey:
            image:
              repository: ghcr.io/valkey-io/valkey
              tag: 9.0.3
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    service:
      nextcloud-valkey:
        ports:
          valkey:
            port: 6379

    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          valkey:
            valkey:
              - path: /data
                subPath: data
              - path: /tmp
                subPath: tmp
