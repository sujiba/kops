---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: anubis-bot-policy
    files:
      - ./resources/anubisBotPolicy.yaml
  - name: envoy-external-extensions
    files:
      - ./resources/blockUserAgents.lua

generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled

resources:
  - ./envoyExtensionPolicy.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  - ./secrets.sops.yaml
