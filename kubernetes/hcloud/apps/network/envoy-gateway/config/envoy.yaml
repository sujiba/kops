---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy
spec:
  logging:
    level:
      default: info
  provider:
    type: Kubernetes
    kubernetes:
      useListenerPortAsContainerPort: true
      envoyService:
        type: ClusterIP
      envoyDaemonSet:
        patch:
          value:
            spec:
              template:
                spec:
                  hostNetwork: true
                  dnsPolicy: ClusterFirstWithHostNet
                  volumes:
                    - name: dynamic-modules
                      image:
                        reference: ghcr.io/tetratelabs/built-on-envoy/composer:0.6.0-dev
                        pullPolicy: IfNotPresent
        container:
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
          imageRepository: mirror.gcr.io/envoyproxy/envoy
          env:                                     # NEU
            - name: GODEBUG
              value: "cgocheck=0"
          volumeMounts:                            # NEU
            - name: dynamic-modules
              mountPath: /etc/envoy/dynamic-modules
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              memory: 1Gi
  dynamicModules:
    - name: composer
      source:
        type: Local
        local:
          path: /etc/envoy/dynamic-modules/libcomposer.so
      doNotClose: true
      loadGlobally: false
  shutdown:
    drainTimeout: 180s
  telemetry:
    metrics:
      prometheus:
        compression:
          type: Zstd

---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: envoy
    namespace: network

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: envoy
spec:
  compressor:
    - type: Zstd
      zstd: {}
    - type: Brotli
      brotli: {}
    - type: Gzip
      gzip: {}
  retry:
    numRetries: 2
    retryOn:
      triggers:
        - reset
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway
  tcpKeepalive: {}
  timeout:
    http:
      connectionIdleTimeout: 15s
      requestTimeout: 0s

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: envoy
spec:
  clientIPDetection:
    xForwardedFor:
      numTrustedHops: 1
  connection:
    bufferLimit: 8Mi
    maxAcceptPerSocketEvent: 0
  http2:
    initialStreamWindowSize: 2Mi
    initialConnectionWindowSize: 32Mi
    onInvalidMessage: TerminateStream
  tcpKeepalive: {}
  timeout:
    http:
      requestReceivedTimeout: 0s
  http3: {}
  #  Required for Collabora WebSocket paths with encoded URLs
  path:
    escapedSlashesAction: KeepUnchanged
    disableMergeSlashes: true
  tls:
    minVersion: "1.2"
    alpnProtocols:
      - h2
      - http/1.1
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway
  headers:
    earlyRequestHeaders:
      set:
        - name: X-Real-IP
          value: '%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%'
        - name: X-Forwarded-Proto
          value: https
        - name: X-Forwarded-Host
          value: "%REQ(:authority)%"
        - name: X-Forwarded-Uri
          value: "%REQ(:path)%"
    lateResponseHeaders:
      remove:
        - "x-powered-by"
        - "x-xss-protection"
      set:
        - name: Strict-Transport-Security
          value: max-age=31536000; includeSubDomains; preload
        - name: Referrer-Policy
          value: same-origin, strict-origin-when-cross-origin
        - name: X-Content-Type-Options
          value: nosniff
        - name: X-Frame-Options
          value: SAMEORIGIN
        - name: server
          value: "UwU"
        - name: X-Robots-tag
          value: "noindex, nofollow"

