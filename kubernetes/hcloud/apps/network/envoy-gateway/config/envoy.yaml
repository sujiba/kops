---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy
  namespace: network
spec:
  logging:
    level:
      default: info
  provider:
    type: Kubernetes
    kubernetes:
      useListenerPortAsContainerPort: true
      envoyService:
        type: ClusterIP
      envoyDaemonSet:
        patch:
          value:
            spec:
              template:
                spec:
                  hostNetwork: true
                  dnsPolicy: ClusterFirstWithHostNet
                  volumes:
                    - name: geoip-db
                      emptyDir: {}
                  initContainers:
                    - name: geoipupdate
                      image: ghcr.io/maxmind/geoipupdate:v8
                      env:
                        - name: GEOIPUPDATE_ACCOUNT_ID
                          valueFrom:
                            secretKeyRef:
                              name: maxmind-secret
                              key: account_id
                        - name: GEOIPUPDATE_LICENSE_KEY
                          valueFrom:
                            secretKeyRef:
                              name: maxmind-secret
                              key: license_key
                        # Country for geo-blocking + ASN for bot/hoster blocking
                        - name: GEOIPUPDATE_EDITION_IDS
                          value: GeoLite2-Country GeoLite2-ASN
                        - name: GEOIPUPDATE_DB_DIR
                          value: /etc/envoy/geoip
                        # Update every 168h (weekly) - matches MaxMind release cadence
                        - name: GEOIPUPDATE_FREQUENCY
                          value: "168"
                        - name: GEOIPUPDATE_VERBOSE
                          value: "1"
                      volumeMounts:
                        - name: geoip-db
                          mountPath: /etc/envoy/geoip
                      resources:
                        requests:
                          cpu: 50m
                          memory: 64Mi
                        limits:
                          memory: 128Mi
                      restartPolicy: Always
                      startupProbe:
                        exec:
                          command:
                            - sh
                            - -c
                            - "test -f /etc/envoy/geoip/GeoLite2-Country.mmdb && test -f /etc/envoy/geoip/GeoLite2-ASN.mmdb"
                        initialDelaySeconds: 2
                        periodSeconds: 3
                        failureThreshold: 20
        container:
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
          imageRepository: mirror.gcr.io/envoyproxy/envoy
          volumeMounts:
            - name: geoip-db
              mountPath: /etc/envoy/geoip
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              memory: 1Gi
  geoIP:
    provider:
      type: MaxMind
      maxMind:
        countryDbSource:
          local:
            path: /etc/envoy/geoip/GeoLite2-Country.mmdb
        asnDbSource:
          local:
            path: /etc/envoy/geoip/GeoLite2-ASN.mmdb
  shutdown:
    drainTimeout: 180s
  telemetry:
    metrics:
      prometheus:
        compression:
          type: Zstd

---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: envoy
    namespace: network

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: envoy
spec:
  compressor:
    - type: Zstd
      zstd: {}
    - type: Brotli
      brotli: {}
    - type: Gzip
      gzip: {}
  retry:
    numRetries: 2
    retryOn:
      triggers:
        - reset
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway
  tcpKeepalive: {}
  timeout:
    http:
      connectionIdleTimeout: 15s
      requestTimeout: 0s

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: envoy
spec:
  clientIPDetection:
    xForwardedFor:
      numTrustedHops: 0
  connection:
    bufferLimit: 8Mi
    maxAcceptPerSocketEvent: 0
  headers:
    earlyRequestHeaders:
      set:
        - name: X-Real-IP
          value: '%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%'
        - name: X-Forwarded-Proto
          value: https
        - name: X-Forwarded-Host
          value: "%REQ(:authority)%"
        - name: X-Forwarded-Uri
          value: "%REQ(:path)%"
    lateResponseHeaders:
      remove:
        - "x-powered-by"
        - "x-xss-protection"
      set:
        - name: Strict-Transport-Security
          value: max-age=31536000; includeSubDomains; preload
        - name: Referrer-Policy
          value: same-origin, strict-origin-when-cross-origin
        - name: X-Content-Type-Options
          value: nosniff
        - name: X-Frame-Options
          value: SAMEORIGIN
        - name: server
          value: "UwU"
        - name: X-Robots-tag
          value: "noindex, nofollow"
  http2:
    initialStreamWindowSize: 2Mi
    initialConnectionWindowSize: 32Mi
    onInvalidMessage: TerminateStream
  http3: {}
  #  Required for Collabora WebSocket paths with encoded URLs
  path:
    escapedSlashesAction: KeepUnchanged
    disableMergeSlashes: true
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway
  tcpKeepalive: {}
  timeout:
    http:
      requestReceivedTimeout: 0s
  tls:
    minVersion: "1.2"
    maxVersion: "1.3"
    ecdhCurves:
      - X25519MLKEM768
      - X25519
      - P-256
    alpnProtocols:
      - h2
      - http/1.1
